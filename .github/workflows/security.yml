name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # Mon 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks · secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    name: pip-audit · python deps
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: apps/api }
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with: { version: "0.5.11" }
      - run: uv python install 3.11
      - run: uv sync --all-extras
      - run: uv run pip-audit --strict --disable-pip

  pnpm-audit:
    name: pnpm-audit · web deps
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: apps/web }
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.2 }
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm audit --prod --audit-level=high

  trivy:
    name: trivy · container scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-results.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: trivy-results.sarif }

  # CodeQL is configured via Code Scanning default setup (Settings → Code
  # security). The default-setup workflow scans python + javascript-typescript
  # on push, PR, and a weekly schedule. No manual workflow needed here.
