name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # =====================================================================
  # Backend lint + typecheck + unit tests
  # =====================================================================
  api:
    name: api · lint, typecheck, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tcvn
          POSTGRES_PASSWORD: tcvn
          POSTGRES_DB: tcvn_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/api

    env:
      DATABASE_URL: postgresql+asyncpg://tcvn:tcvn@localhost:5432/tcvn_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      S3_ACCESS_KEY: ci
      S3_SECRET_KEY: ci
      ANTHROPIC_API_KEY: sk-ant-ci
      API_SECRET_KEY: ci-secret-key-with-enough-entropy
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.5.11"

      - name: Set up Python
        run: uv python install 3.11

      - name: Cache uv venv
        uses: actions/cache@v5
        with:
          path: apps/api/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('apps/api/uv.lock', 'apps/api/pyproject.toml') }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: System deps for tests (tesseract, poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-vie poppler-utils libmagic1

      - name: Ruff lint + format check
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Pytest (unit + integration)
        run: uv run pytest -m "not slow" --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: api-coverage
          path: apps/api/coverage.xml

  # =====================================================================
  # Web lint + typecheck + tests
  # =====================================================================
  web:
    name: web · lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  # =====================================================================
  # Container image build (smoke test only; no push)
  # =====================================================================
  build-images:
    name: docker · build images
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: apps/api
          target: prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Web image
        uses: docker/build-push-action@v7
        with:
          context: apps/web
          target: prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
