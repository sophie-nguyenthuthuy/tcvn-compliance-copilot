# Run: `pre-commit install` once, then it's automatic on every commit.
# To run against the whole repo: `pre-commit run --all-files`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2000]
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^apps/api/
      - id: ruff-format
        files: ^apps/api/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^apps/web/.*\.(ts|tsx|css|json|md)$

  - repo: local
    hooks:
      - id: alembic-check
        name: alembic migrations follow chain
        language: system
        files: ^apps/api/alembic/versions/.*\.py$
        entry: bash -c 'cd apps/api && uv run alembic check >/dev/null'
        pass_filenames: false
        stages: [pre-push]
