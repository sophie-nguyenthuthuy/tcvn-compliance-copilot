name: tcvn-copilot

x-api-env: &api-env
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
  S3_REGION: ${S3_REGION}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS}
  S3_BUCKET_REPORTS: ${S3_BUCKET_REPORTS}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  CLAUDE_REASONING_MODEL: ${CLAUDE_REASONING_MODEL}
  CLAUDE_EXTRACTION_MODEL: ${CLAUDE_EXTRACTION_MODEL}
  CLAUDE_PROMPT_CACHE_ENABLED: ${CLAUDE_PROMPT_CACHE_ENABLED}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL}
  EMBEDDING_DIM: ${EMBEDDING_DIM}
  API_SECRET_KEY: ${API_SECRET_KEY}
  API_CORS_ORIGINS: ${API_CORS_ORIGINS}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME}
  SENTRY_DSN: ${SENTRY_DSN}

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      mc mb --ignore-existing local/${S3_BUCKET_UPLOADS};
      mc mb --ignore-existing local/${S3_BUCKET_REPORTS};
      mc anonymous set download local/${S3_BUCKET_REPORTS};
      exit 0;
      "

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    environment:
      <<: *api-env
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/alembic:/app/alembic
      - ./apps/api/alembic.ini:/app/alembic.ini
      - ./packages/standards-corpus:/app/standards-corpus:ro
      - ./data/uploads:/app/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["uvicorn", "tcvn_copilot.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    environment:
      <<: *api-env
    volumes:
      - ./apps/api/src:/app/src
      - ./packages/standards-corpus:/app/standards-corpus:ro
      - ./data/uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "tcvn_copilot.workers.celery_app", "worker", "--loglevel=info", "--concurrency=2"]

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    ports:
      - "3000:3000"
    depends_on:
      - api
    command: ["pnpm", "dev"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
