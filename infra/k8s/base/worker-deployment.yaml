apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: worker }
  template:
    metadata:
      labels: { app.kubernetes.io/name: worker }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: worker
          image: ghcr.io/sophie-nguyenthuthuy/tcvn-compliance-copilot/api:latest
          command: ["celery", "-A", "tcvn_copilot.workers.celery_app", "worker"]
          args: ["--loglevel=info", "--concurrency=2"]
          envFrom:
            - configMapRef: { name: tcvn-config }
            - secretRef: { name: tcvn-secrets }
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits:   { cpu: "4",  memory: 4Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
