apiVersion: v1
kind: ConfigMap
metadata:
  name: tcvn-config
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  CLAUDE_REASONING_MODEL: "claude-opus-4-7"
  CLAUDE_EXTRACTION_MODEL: "claude-haiku-4-5-20251001"
  CLAUDE_PROMPT_CACHE_ENABLED: "true"
  EMBEDDING_MODEL: "BAAI/bge-m3"
  EMBEDDING_DIM: "1024"
  RAG_TOP_K: "8"
  S3_BUCKET_UPLOADS: "tcvn-uploads"
  S3_BUCKET_REPORTS: "tcvn-reports"
  OTEL_SERVICE_NAME: "tcvn-copilot-api"
  PROMETHEUS_METRICS_ENABLED: "true"
