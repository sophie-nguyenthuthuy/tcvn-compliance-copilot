apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tcvn-copilot

resources:
  - ../../base

images:
  - name: ghcr.io/OWNER/tcvn-compliance-copilot/api
    newTag: v0.1.0
  - name: ghcr.io/OWNER/tcvn-compliance-copilot/web
    newTag: v0.1.0

patches:
  - target: { kind: Deployment, name: api }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 4
