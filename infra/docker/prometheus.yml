global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: tcvn-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: tcvn-worker
    static_configs:
      - targets: ["worker:9540"]   # if Celery's prometheus exporter is wired
